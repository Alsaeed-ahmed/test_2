<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarShowcase | Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="body" class="light">

<nav id="navbar">
  <div class="nav-brand"><a href="index.html">🏎 CarShowcase</a></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="search.html">Search</a></li>
    <li><a href="bmw.html">BMW</a></li>
    <li><a href="mercedes.html">Mercedes</a></li>
    <li><a href="audi.html">Audi</a></li>
    <li><a href="comparison.html">Compare</a></li>
    <li id="auth-nav-item"><a href="login.html">Login</a></li>
  </ul>
  <div class="nav-actions">
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙 Dark Mode</button>
    <button class="btn-icon audio-btn" id="sound-btn" onclick="playEngineSound()">🔊 Engine</button>
  </div>
</nav>

<div id="page-wrapper">
<main>
  <div class="search-page">
    <h1>Search Cars</h1>

    <!--
      FILTER CONTROLS
      Live filtering: every input triggers filterCars() via 'input' event.
      Time complexity: O(n) — single pass through 9 cars.
    -->
    <section class="search-filters" aria-label="Filter options">

      <div class="filter-group" style="flex:2;min-width:200px">
        <label for="search-query">Search model or brand</label>
        <input type="text" id="search-query" placeholder="e.g. M3, RS6, AMG…">
      </div>

      <div class="filter-group">
        <label for="filter-brand">Brand</label>
        <select id="filter-brand">
          <option value="">All brands</option>
          <option value="BMW">BMW</option>
          <option value="Mercedes">Mercedes</option>
          <option value="Audi">Audi</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-type">Body type</label>
        <select id="filter-type">
          <option value="">All types</option>
          <option value="Sedan">Sedan</option>
          <option value="SUV">SUV</option>
          <option value="Coupe">Coupe</option>
          <option value="Wagon">Wagon</option>
          <option value="Hybrid">Hybrid</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-price">Max price (USD)</label>
        <select id="filter-price">
          <option value="0">Any price</option>
          <option value="80000">Under $80,000</option>
          <option value="100000">Under $100,000</option>
          <option value="130000">Under $130,000</option>
          <option value="170000">Under $170,000</option>
        </select>
      </div>

    </section>

    <p class="search-results-count" id="results-count">Loading…</p>

    <!-- Results rendered by renderSearchResults() in script.js -->
    <div class="cards-grid" id="search-results">
      <p style="color:var(--text-muted)">Loading cars…</p>
    </div>

  </div>
</main>
<footer>
  <div class="footer-inner">
    <p>&copy; 2025 CarShowcase. All prices in USD.</p>
    <nav class="footer-links">
      <a href="index.html">Home</a>
      <a href="comparison.html">Compare</a>
    </nav>
  </div>
</footer>
</div>

<script src="script.js"></script>
</body>
</html>
