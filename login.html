<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarShowcase | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="body" class="light">

<nav id="navbar">
  <div class="nav-brand"><a href="index.html">🏎 CarShowcase</a></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="search.html">Search</a></li>
    <li><a href="bmw.html">BMW</a></li>
    <li><a href="mercedes.html">Mercedes</a></li>
    <li><a href="audi.html">Audi</a></li>
    <li><a href="comparison.html">Compare</a></li>
    <li id="auth-nav-item"><a href="login.html">Login</a></li>
  </ul>
  <div class="nav-actions">
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙 Dark Mode</button>
    <button class="btn-icon audio-btn" id="sound-btn" onclick="playEngineSound()">🔊 Engine</button>
  </div>
</nav>

<div id="page-wrapper">
<main>

  <section class="auth-page">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="auth-subtitle">Sign in to your CarShowcase account</p>

      <!--
        IMPORTANT: No HTML5 validation attributes used.
        - No  required  attribute on any input
        - No  type="email"  — inputs use  type="text"
        - All validation handled by custom JavaScript (handleLogin in script.js)
      -->
      <form id="login-form" novalidate>

        <div class="form-group">
          <label for="login-email">Email address</label>
          <!-- type="text" intentional — custom regex validation in JS -->
          <input type="text" id="login-email" placeholder="you@example.com" autocomplete="email">
          <div class="error-msg" id="err-login-email"></div>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password">
          <div class="error-msg" id="err-login-pw"></div>
        </div>

        <button type="submit" class="form-submit">Sign In →</button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="signup.html">Create one</a>
      </p>

      <!-- Demo hint -->
      <div style="margin-top:1.5rem;padding:0.9rem 1rem;background:var(--surface2);border-radius:10px;font-size:0.82rem;color:var(--text-muted);border:1px solid var(--border)">
        <strong style="color:var(--text)">Demo:</strong> Register on the sign-up page first, then log in here.
      </div>
    </div>
  </section>

</main>
<footer>
  <div class="footer-inner">
    <p>&copy; 2025 CarShowcase</p>
    <nav class="footer-links">
      <a href="index.html">Home</a>
      <a href="signup.html">Sign Up</a>
    </nav>
  </div>
</footer>
</div>

<script src="script.js"></script>
</body>
</html>
